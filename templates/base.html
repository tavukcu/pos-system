<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS Sistemi{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">POS</div>
        <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
            <span class="icon">&#9632;</span> Ana Sayfa
        </a>
        <a href="/pos" class="nav-item {% if request.path == '/pos' %}active{% endif %}">
            <span class="icon">&#9654;</span> Satis
        </a>
        <a href="/urunler" class="nav-item {% if request.path == '/urunler' %}active{% endif %}">
            <span class="icon">&#9642;</span> Urunler
        </a>
        <a href="/musteriler" class="nav-item {% if request.path == '/musteriler' %}active{% endif %}">
            <span class="icon">&#9830;</span> Musteriler
        </a>
        <a href="/raporlar" class="nav-item {% if request.path == '/raporlar' %}active{% endif %}">
            <span class="icon">&#9733;</span> Raporlar
        </a>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <!-- Satis Detay Modal -->
    <div id="satis-detay-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center">
        <div style="background:#fff;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;position:relative">
            <button onclick="document.getElementById('satis-detay-modal').style.display='none'" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:24px;cursor:pointer">&times;</button>
            <h3 id="sdm-title" style="margin:0 0 16px">Satis Detayi</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Urun</th><th>Miktar</th><th>Fiyat</th><th>Tutar</th></tr></thead>
                    <tbody id="sdm-body"></tbody>
                    <tfoot><tr><th colspan="3" style="text-align:right">TOPLAM</th><th id="sdm-toplam"></th></tr></tfoot>
                </table>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
    async function showSatisDetay(id, fisNo, tarih) {
        const modal = document.getElementById('satis-detay-modal');
        document.getElementById('sdm-title').textContent = 'Fis #' + fisNo + ' - ' + tarih;
        document.getElementById('sdm-body').innerHTML = '<tr><td colspan="4">Yukleniyor...</td></tr>';
        modal.style.display = 'flex';
        const data = await fetch('/api/rapor/satis_detay?id=' + encodeURIComponent(id)).then(r => r.json());
        let toplam = 0;
        document.getElementById('sdm-body').innerHTML = data.map(d => {
            toplam += d.tutar;
            return `<tr><td>${d.urun}</td><td>${d.miktar.toFixed(2)}</td><td>${formatMoney(d.fiyat)}</td><td><strong>${formatMoney(d.tutar)}</strong></td></tr>`;
        }).join('') || '<tr><td colspan="4">Urun bulunamadi</td></tr>';
        document.getElementById('sdm-toplam').innerHTML = '<strong>' + formatMoney(toplam) + '</strong>';
    }
    document.getElementById('satis-detay-modal').addEventListener('click', function(e) {
        if (e.target === this) this.style.display = 'none';
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
